<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tropical fish - filled, colorful -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="32" cy="32" rx="20" ry="14" fill="url(#bodyGrad)"/>
  <!-- Tail -->
  <path d="M12 32 L2 22 L2 42 Z" fill="#14b8a6"/>
  <!-- Dorsal fin -->
  <path d="M28 18 Q32 8 40 18" fill="#0d9488" stroke="none"/>
  <!-- Bottom fin -->
  <path d="M28 46 Q32 54 36 46" fill="#0d9488"/>
  <!-- Eye -->
  <circle cx="42" cy="30" r="4" fill="white"/>
  <circle cx="43" cy="29" r="2" fill="#1e293b"/>
  <!-- Stripes -->
  <path d="M25 24 Q32 32 25 40" stroke="#0e7490" stroke-width="2" fill="none"/>
  <path d="M32 22 Q38 32 32 42" stroke="#0e7490" stroke-width="2" fill="none"/>
</svg>
