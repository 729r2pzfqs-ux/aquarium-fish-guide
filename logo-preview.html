<!DOCTYPE html>
<html>
<head>
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#06b6d4">
    <title>FishFinder Logo - Fin Options</title>
    <style>
        body { font-family: system-ui; background: #f1f5f9; padding: 40px; }
        h1, h2 { color: #0f172a; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; max-width: 1000px; margin: 0 auto 40px; }
        .card { background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100px; height: 100px; margin-bottom: 12px; }
        .card h3 { margin: 0 0 4px; color: #0f172a; font-size: 16px; }
        .card p { margin: 0; color: #64748b; font-size: 13px; }
        .highlight { border: 3px solid #06b6d4; }
    </style>
</head>
<body>
    <h1>🐠 FishFinder Fin Options</h1>
    <p style="text-align:center;color:#64748b;margin-bottom:30px;">Same body, different tail/fin styles</p>
    
    <div class="grid">
        <div class="card highlight">
            <img src="favicon.svg" alt="Current">
            <h3>Current</h3>
            <p>Split curves</p>
        </div>
        <div class="card">
            <img src="logo-fin-1.svg" alt="Fin 1">
            <h3>Option 1</h3>
            <p>Flowing curves</p>
        </div>
        <div class="card">
            <img src="logo-fin-2.svg" alt="Fin 2">
            <h3>Option 2</h3>
            <p>Forked / sharp</p>
        </div>
        <div class="card">
            <img src="logo-fin-3.svg" alt="Fin 3">
            <h3>Option 3</h3>
            <p>Rounded fan</p>
        </div>
        <div class="card">
            <img src="logo-fin-4.svg" alt="Fin 4">
            <h3>Option 4</h3>
            <p>Three-pointed</p>
        </div>
        <div class="card">
            <img src="logo-fin-5.svg" alt="Fin 5">
            <h3>Option 5</h3>
            <p>Swept back</p>
        </div>
        <div class="card">
            <img src="logo-fin-6.svg" alt="Fin 6">
            <h3>Option 6</h3>
            <p>Crescent moon</p>
        </div>
    </div>
</body>
</html>
