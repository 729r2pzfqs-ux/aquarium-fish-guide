<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics Placeholder -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Aquarium Fish Side by Side | AquariumFishGuide</title>
    <meta name="description" content="Compare aquarium fish side by side. See tank requirements, temperament, care level, and more to find your perfect match.">
    <link rel="canonical" href="https://aquariumfishguide.com/compare/">
    
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://aquariumfishguide.com/compare/">
    <meta property="og:title" content="Compare Aquarium Fish Side by Side">
    <meta property="og:description" content="Compare aquarium fish to find your perfect match.">
    <meta property="og:site_name" content="AquariumFishGuide">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-50 via-white to-teal-50 min-h-screen text-slate-800">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="../" class="flex items-center gap-2">
                <svg class="w-8 h-8 text-cyan-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6.5 12c.94-3.46 4.94-6 8.5-6 3.56 0 6.06 2.54 7 6-.94 3.46-3.44 6-7 6-3.56 0-7.56-2.54-8.5-6Z"/>
                    <path d="M18 12v.5"/>
                    <path d="M16 10c1 0 2 1 2 2s-1 2-2 2"/>
                    <path d="M2 12h3"/>
                </svg>
                <span class="text-xl font-bold bg-gradient-to-r from-cyan-600 to-teal-600 bg-clip-text text-transparent">AquariumFishGuide</span>
            </a>
            <nav class="flex items-center gap-6 text-sm font-medium">
                <a href="../search/" class="text-slate-600 hover:text-cyan-600 transition">Browse Fish</a>
                <a href="../quiz/" class="bg-gradient-to-r from-cyan-500 to-teal-600 text-white px-5 py-2.5 rounded-xl font-semibold hover:shadow-lg hover:shadow-cyan-500/25 transition">Find Your Fish</a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4">
                Compare
                <span class="bg-gradient-to-r from-cyan-500 to-teal-600 bg-clip-text text-transparent">Fish Species</span>
            </h1>
            <p class="text-lg text-slate-600">Select up to 3 fish to compare side by side</p>
        </div>

        <!-- Fish Selectors -->
        <div class="grid md:grid-cols-3 gap-4 mb-10">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Fish 1</label>
                <select id="fish1" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-cyan-400 focus:outline-none bg-white">
                    <option value="">Select a fish...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Fish 2</label>
                <select id="fish2" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-cyan-400 focus:outline-none bg-white">
                    <option value="">Select a fish...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Fish 3 (optional)</label>
                <select id="fish3" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-cyan-400 focus:outline-none bg-white">
                    <option value="">Select a fish...</option>
                </select>
            </div>
        </div>

        <!-- Comparison Table -->
        <div id="comparison-container" class="hidden">
            <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden">
                <table class="w-full">
                    <thead id="comparison-header">
                    </thead>
                    <tbody id="comparison-body">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-20">
            <div class="text-6xl mb-4">🐠</div>
            <h3 class="text-xl font-bold text-slate-700 mb-2">Select fish to compare</h3>
            <p class="text-slate-500">Choose at least 2 fish from the dropdowns above</p>
        </div>

        <!-- Popular Comparisons -->
        <div class="mt-16">
            <h2 class="text-2xl font-bold mb-6">Popular Comparisons</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="setFish('neon-tetra', 'cardinal-tetra')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Neon Tetra vs Cardinal Tetra</span>
                    <p class="text-sm text-slate-500">The classic tetra showdown</p>
                </button>
                <button onclick="setFish('betta', 'dwarf-gourami')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Betta vs Dwarf Gourami</span>
                    <p class="text-sm text-slate-500">Solo centerpiece fish</p>
                </button>
                <button onclick="setFish('guppy', 'platy', 'molly')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Guppy vs Platy vs Molly</span>
                    <p class="text-sm text-slate-500">Livebearer comparison</p>
                </button>
                <button onclick="setFish('corydoras-catfish', 'otocinclus')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Corydoras vs Otocinclus</span>
                    <p class="text-sm text-slate-500">Bottom dweller options</p>
                </button>
                <button onclick="setFish('bristlenose-pleco', 'pleco')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Bristlenose vs Common Pleco</span>
                    <p class="text-sm text-slate-500">Size matters!</p>
                </button>
                <button onclick="setFish('cherry-shrimp', 'mystery-snail')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Cherry Shrimp vs Mystery Snail</span>
                    <p class="text-sm text-slate-500">Cleanup crew options</p>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-100 mt-16 py-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>© 2026 AquariumFishGuide. Made with 🐠 for fish lovers everywhere.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        
        let fish = [];

        // Load fish from JSON
        fetch('../data/fish.json')
            .then(r => r.json())
            .then(data => {
                fish = data;
                populateSelects();
            })
            .catch(e => console.error('Failed to load fish:', e));

        function populateSelects() {
            const selects = ['fish1', 'fish2', 'fish3'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                fish.forEach(f => {
                    const option = document.createElement('option');
                    option.value = f.id;
                    option.textContent = f.name;
                    select.appendChild(option);
                });
            });
        }

        function setFish(id1, id2, id3 = '') {
            document.getElementById('fish1').value = id1;
            document.getElementById('fish2').value = id2;
            document.getElementById('fish3').value = id3;
            updateComparison();
        }

        function updateComparison() {
            const selected = [
                document.getElementById('fish1').value,
                document.getElementById('fish2').value,
                document.getElementById('fish3').value
            ].filter(v => v);

            if (selected.length < 2) {
                document.getElementById('comparison-container').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('comparison-container').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            const selectedFish = selected.map(id => fish.find(f => f.id === id));
            renderComparison(selectedFish);
        }

        function renderComparison(selectedFish) {
            // Header
            const header = document.getElementById('comparison-header');
            header.innerHTML = `
                <tr class="border-b border-slate-100">
                    <th class="p-4 text-left text-slate-500 font-medium w-1/4">Attribute</th>
                    ${selectedFish.map(f => `
                        <th class="p-4 text-center">
                            <a href="../fish/${f.id}/" class="group">
                                <div class="w-16 h-16 bg-gradient-to-br from-cyan-100 to-teal-100 rounded-xl mx-auto mb-2 flex items-center justify-center text-3xl">🐟</div>
                                <div class="font-bold text-slate-800 group-hover:text-cyan-600 transition">${f.name}</div>
                            </a>
                        </th>
                    `).join('')}
                </tr>
            `;

            // Body
            const body = document.getElementById('comparison-body');
            
            const temperamentColors = {
                peaceful: 'text-emerald-600',
                'semi-aggressive': 'text-amber-600',
                aggressive: 'text-red-600'
            };

            const careColors = {
                beginner: 'text-green-600',
                intermediate: 'text-yellow-600',
                advanced: 'text-purple-600'
            };

            const rows = [
                { label: 'Scientific Name', render: f => `<em class="text-slate-500">${f.scientific_name}</em>` },
                { label: 'Tank Size', render: f => f.tank_size },
                { label: 'Adult Size', render: f => `${f.size_inches}"` },
                { label: 'Lifespan', render: f => `${f.lifespan_years} years` },
                { label: 'Temperature', render: f => f.temp_range },
                { label: 'pH Range', render: f => f.ph_range },
                { label: 'Temperament', render: f => `<span class="${temperamentColors[f.temperament] || ''} font-medium">${f.temperament}</span>` },
                { label: 'Care Level', render: f => `<span class="${careColors[f.care_level] || ''} font-medium">${f.care_level}</span>` },
                { label: 'Schooling', render: f => f.schooling ? `Yes (${f.school_size})` : 'No' },
                { label: 'Category', render: f => f.category },
                { label: 'Beginner Friendly', render: f => f.beginner_friendly ? '✅ Yes' : '❌ No' }
            ];

            body.innerHTML = rows.map((row, i) => `
                <tr class="${i % 2 === 0 ? 'bg-slate-50/50' : ''}">
                    <td class="p-4 text-slate-600 font-medium">${row.label}</td>
                    ${selectedFish.map(f => `
                        <td class="p-4 text-center text-slate-800">
                            ${row.render(f)}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
