<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Modern minimal fish with magnifying glass (finder concept) -->
  <defs>
    <linearGradient id="fishGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Fish body -->
  <path d="M8 32 Q8 20 24 20 L40 20 Q52 20 52 32 Q52 44 40 44 L24 44 Q8 44 8 32 Z" fill="url(#fishGrad2)"/>
  <!-- Tail -->
  <path d="M8 32 L0 24 L0 40 Z" fill="#14b8a6"/>
  <!-- Eye as magnifying glass -->
  <circle cx="44" cy="32" r="8" fill="none" stroke="white" stroke-width="3"/>
  <line x1="50" y1="38" x2="56" y2="44" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="44" cy="32" r="4" fill="white" opacity="0.3"/>
  <!-- Bubbles -->
  <circle cx="58" cy="16" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="54" cy="10" r="2" fill="#22d3ee" opacity="0.4"/>
</svg>
